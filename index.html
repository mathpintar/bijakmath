<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MathPintar - Latihan Matematik Bentuk Lazim</title>
    
    <!-- TUKAR KE TAILWIND V3 CDN YANG LEBIH STABIL UNTUK MOBILE/DEVICE LAMA -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Share+Tech+Mono&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        /* Tambahan fallback jika CDN lambat load, background asal tidak putih kosong */
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #f0fdf4;
            -webkit-text-size-adjust: 100%;
        }
        .font-kids {
            font-family: 'Fredoka', sans-serif;
        }
        .math-font {
            font-family: 'Share Tech Mono', monospace;
        }
        .strikethrough {
            position: relative;
        }
        .strikethrough::after {
            content: "";
            position: absolute;
            left: 0;
            top: 50%;
            width: 100%;
            height: 4px;
            background: #ef4444;
            transform: rotate(-25deg);
        }
        /* Memastikan elemen disembunyikan sebelum Vue selesai loading */
        [v-cloak] { display: none !important; }
    </style>
</head>
